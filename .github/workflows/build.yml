name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: kaos-engine-vst3-windows
          - os: macos-latest
            artifact: kaos-engine-vst3-macos
          - os: ubuntu-24.04
            artifact: kaos-engine-vst3-linux

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up build tools (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python

      - name: Set up build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja

      - name: Set up build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            meson ninja-build g++ \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libgl1-mesa-dev libfreetype6-dev libfontconfig1-dev \
            libasound2-dev libcurl4-openssl-dev \
            zip

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: meson setup build --buildtype=release

      - name: Configure (macOS / Linux)
        if: runner.os != 'Windows'
        run: meson setup build --buildtype=release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: meson compile -C build

      - name: Build (macOS / Linux)
        if: runner.os != 'Windows'
        run: meson compile -C build

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Get-ChildItem build/src/plugin -Filter *.vst3 -Directory |
            ForEach-Object { Copy-Item $_.FullName dist/ -Recurse }
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Package (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp -r build/src/plugin/*.vst3 dist/
          cd dist && zip -r ../${{ matrix.artifact }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '**/*.zip'
          generate_release_notes: true
